events {}

http {
  server {
    listen 3100;

    auth_basic "Observability - Loki";
    auth_basic_user_file /etc/nginx/loki.htpasswd;

    location / {
      proxy_pass http://otel-loki:3100;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }

  server {
    listen 16686;

    auth_basic "Observability - Jaeger";
    auth_basic_user_file /etc/nginx/jaeger.htpasswd;

    location / {
      proxy_pass http://otel-jaeger:16686;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
