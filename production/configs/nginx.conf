events {}

http {
  ssl_protocols           TLSv1.2 TLSv1.3;
  ssl_ciphers             ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
  ssl_prefer_server_ciphers off;
  ssl_session_cache       shared:SSL:10m;
  ssl_session_timeout     1d;
  ssl_session_tickets     off;

  # HTTP → HTTPS redirect
  server {
    listen 80;
    server_name jaeger.ptechsistemas.com prometheus.ptechsistemas.com loki.ptechsistemas.com otel.ptechsistemas.com;
    return 301 https://$host$request_uri;
  }

  # Jaeger UI — Basic Auth + TLS
  server {
    listen 443 ssl;
    server_name jaeger.ptechsistemas.com;
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    auth_basic "Observability - Jaeger";
    auth_basic_user_file /etc/nginx/jaeger.htpasswd;

    location / {
      proxy_pass             http://otel-jaeger:16686;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }
  }

  # Prometheus — TLS (native basic auth handled by Prometheus itself)
  server {
    listen 443 ssl;
    server_name prometheus.ptechsistemas.com;
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    location / {
      proxy_pass             http://otel-prometheus:9090;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }
  }

  # Loki — Basic Auth + TLS
  server {
    listen 443 ssl;
    server_name loki.ptechsistemas.com;
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    auth_basic "Observability - Loki";
    auth_basic_user_file /etc/nginx/loki.htpasswd;

    location / {
      proxy_pass             http://otel-loki:3100;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }
  }

  # OTEL Collector HTTP — TLS (basic auth handled by collector)
  server {
    listen 443 ssl;
    server_name otel.ptechsistemas.com;
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    location / {
      proxy_pass             http://otel-collector:4318;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }
  }

  # OTEL Collector gRPC — TLS + HTTP/2 (basic auth handled by collector)
  server {
    listen 14317 ssl;
    http2 on;
    server_name otel.ptechsistemas.com;
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    location / {
      grpc_pass grpc://otel-collector:4317;
    }
  }
}
