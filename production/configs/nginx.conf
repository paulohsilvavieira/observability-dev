events {}

http {
  # ─── TLS Global ─────────────────────────────────────────────────────────────
  # Permite apenas TLS 1.2 e 1.3 — versões anteriores (1.0, 1.1) têm vulnerabilidades conhecidas.
  ssl_protocols           TLSv1.2 TLSv1.3;
  # Conjunto de cifras modernas com Perfect Forward Secrecy (ECDHE).
  # CHACHA20-POLY1305 é preferida em dispositivos sem aceleração AES por hardware.
  ssl_ciphers             ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
  # Deixa o cliente escolher a cifra (recomendação moderna — clientes modernos têm boas preferências).
  ssl_prefer_server_ciphers off;
  # Cache de sessões TLS compartilhado entre os workers do Nginx (10 MB ≈ 40.000 sessões).
  ssl_session_cache       shared:SSL:10m;
  # Uma sessão TLS pode ser reutilizada por até 1 dia sem novo handshake completo.
  ssl_session_timeout     1d;
  # Session tickets desabilitados — tickets comprometem Perfect Forward Secrecy
  # porque reutilizam uma chave de longa duração.
  ssl_session_tickets     off;

  # ─── Redirect HTTP → HTTPS ──────────────────────────────────────────────────
  # Qualquer requisição HTTP em porta 80 é redirecionada permanentemente (301) para HTTPS.
  # O 301 faz browsers memorizarem o redirect e não tentarem HTTP novamente.
  server {
    listen 80;
    server_name jaeger.ptechsistemas.com prometheus.ptechsistemas.com loki.ptechsistemas.com otel.ptechsistemas.com alertmanager.ptechsistemas.com grpc.ptechsistemas.com;
    return 301 https://$host$request_uri;
  }

  # ─── Jaeger UI ──────────────────────────────────────────────────────────────
  # Jaeger não tem autenticação nativa — o Nginx faz auth_basic antes de proxiar.
  # O arquivo jaeger.htpasswd usa hash APR1 (gerado por: openssl passwd -apr1).
  server {
    listen 443 ssl;
    server_name jaeger.ptechsistemas.com;
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    auth_basic "Observability - Jaeger";
    auth_basic_user_file /etc/nginx/jaeger.htpasswd;

    location / {
      proxy_pass             http://otel-jaeger:16686;
      # Repassa o hostname original para o backend (necessário para apps multi-host).
      proxy_set_header Host              $host;
      # IP real do cliente (útil para logs e rate limiting no backend).
      proxy_set_header X-Real-IP         $remote_addr;
      # Cadeia de IPs quando há múltiplos proxies na frente.
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      # Informa ao backend que o cliente original usou HTTPS.
      proxy_set_header X-Forwarded-Proto https;
    }
  }

  # ─── Prometheus ─────────────────────────────────────────────────────────────
  # O Prometheus tem autenticação nativa configurada em prometheus-web.yaml (bcrypt).
  # O Nginx só faz TLS termination — não adiciona auth_basic aqui para não duplicar.
  server {
    listen 443 ssl;
    server_name prometheus.ptechsistemas.com;
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    location / {
      proxy_pass             http://otel-prometheus:9090;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }
  }

  # ─── Loki ───────────────────────────────────────────────────────────────────
  # Loki não tem autenticação nativa habilitada (auth_enabled: false no loki.yaml).
  # O Nginx faz auth_basic com hash APR1 antes de proxiar.
  server {
    listen 443 ssl;
    server_name loki.ptechsistemas.com;
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    auth_basic "Observability - Loki";
    auth_basic_user_file /etc/nginx/loki.htpasswd;

    location / {
      proxy_pass             http://otel-loki:3100;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }
  }

  # ─── Alertmanager ───────────────────────────────────────────────────────────
  # Alertmanager não tem autenticação nativa — o Nginx faz auth_basic com hash APR1.
  server {
    listen 443 ssl;
    server_name alertmanager.ptechsistemas.com;
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    auth_basic "Observability - Alertmanager";
    auth_basic_user_file /etc/nginx/alertmanager.htpasswd;

    location / {
      proxy_pass             http://otel-alertmanager:9093;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }
  }

  # ─── OTEL Collector HTTP (:443) ─────────────────────────────────────────────
  # Recebe telemetria via OTLP/HTTP das aplicações.
  # O collector faz sua própria autenticação (basicauth/otlp extension) —
  # o Nginx apenas termina o TLS e proxia para a porta interna 4318.
  server {
    listen 443 ssl;
    server_name otel.ptechsistemas.com;
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    location / {
      proxy_pass             http://otel-collector:4318;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }
  }

  # ─── OTEL Collector gRPC (:443) ─────────────────────────────────────────────
  # Recebe telemetria via OTLP/gRPC das aplicações (protocolo preferencial para alto volume).
  # Subdomínio separado (grpc.ptechsistemas.com) porque gRPC requer HTTP/2 e não pode
  # compartilhar o mesmo server_name:443 com blocos HTTP/1.1.
  # grpc_pass é diferente de proxy_pass: faz passthrough de frames gRPC sem buffering.
  # Apps devem usar: https://grpc.ptechsistemas.com (porta 443 implícita)
  server {
    listen 443 ssl;
    # HTTP/2 é obrigatório para gRPC funcionar.
    http2 on;
    server_name grpc.ptechsistemas.com;
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    location / {
      grpc_pass grpc://otel-collector:4317;
    }
  }
}
