global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: production

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:9464"]
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "^(otel_|up|scrape_).*"
        action: keep
