services:

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: otel-jaeger
    restart: unless-stopped
    user: root
    environment:
      SPAN_STORAGE_TYPE: badger
      BADGER_EPHEMERAL: "false"
      BADGER_DIRECTORY_VALUE: /badger/data
      BADGER_DIRECTORY_KEY: /badger/key
      COLLECTOR_OTLP_ENABLED: "true"
    volumes:
      - jaeger_data:/badger
    networks:
      - observability-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: otel-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
      - --web.config.file=/etc/prometheus/web.yaml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --storage.tsdb.retention.size=10GB
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - ./configs/prometheus-web.yaml:/etc/prometheus/web.yaml:ro
      - prometheus_data:/prometheus
    networks:
      - observability-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://otel:observability123@localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  loki:
    image: grafana/loki:3.4.2
    container_name: otel-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yaml
    volumes:
      - ./configs/loki.yaml:/etc/loki/config.yaml:ro
      - loki_data:/loki
    networks:
      - observability-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.99.0
    container_name: otel-collector
    restart: unless-stopped
    command: --config=/etc/otelcol/config.yaml
    ports:
      - "14317:4317"
      - "14318:4318"
      - "13133:13133"
      - "9464:9464"
    volumes:
      - ./configs/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    networks:
      - observability-net
    depends_on:
      jaeger:
        condition: service_healthy
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: otel-nginx
    restart: unless-stopped
    ports:
      - "3100:3100"
      - "16686:16686"
    volumes:
      - ./configs/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./configs/loki.htpasswd:/etc/nginx/loki.htpasswd:ro
      - ./configs/jaeger.htpasswd:/etc/nginx/jaeger.htpasswd:ro
    networks:
      - observability-net
    depends_on:
      jaeger:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  grafana:
    image: grafana/grafana:10.4.2
    container_name: otel-grafana
    restart: unless-stopped
    ports:
      - "3400:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - observability-net
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  observability-net:
    driver: bridge

volumes:
  jaeger_data:
  prometheus_data:
  loki_data:
  grafana_data:
