default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>
  username: <%= ENV.fetch("POSTGRES_USER", "postgres") %>
  password: <%= ENV.fetch("POSTGRES_PASSWORD", "password") %>
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  port: <%= ENV.fetch("DATABASE_PORT", 5432) %>

debug:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_DB", "rails_app_development") %>
  
development:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_DB", "rails_app_development") %>

test:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_DB_TEST", "rails_app_test") %>

production:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_DB", "rails_app_production") %>
